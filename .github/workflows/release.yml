name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install libpcap
        run: sudo apt-get install -y libpcap-dev

      - name: Build binaries
        run: make release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/nethawk-*
          generate_release_notes: true
