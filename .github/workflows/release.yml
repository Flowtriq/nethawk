name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: nethawk-linux-amd64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            binary: nethawk-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: nethawk-darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o ${{ matrix.binary }} ./cmd/nethawk

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x nethawk-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nethawk-*
          generate_release_notes: true
