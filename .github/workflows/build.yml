name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install libpcap
        run: sudo apt-get install -y libpcap-dev

      - name: Build
        run: make build

      - name: Test
        run: make test
